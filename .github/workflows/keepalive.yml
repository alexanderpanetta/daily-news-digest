name: Keepalive

# GitHub disables scheduled workflows after 60 days of no repo commits.
# This pushes a tiny empty commit on the 1st of every month so the
# Daily News Digest schedule is never auto-disabled for inactivity.

on:
  schedule:
    - cron: '0 4 1 * *'   # 04:00 UTC on the 1st of each month
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Push empty keepalive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive [skip ci]"
          git push
